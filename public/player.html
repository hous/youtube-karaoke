<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Karaoke Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      cursor: none;
    }

    #player {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #player iframe { width: 100%; height: 100%; border: none; }

    .status {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      color: #555; font-size: 14px; font-family: -apple-system, sans-serif;
      pointer-events: none;
      transition: opacity 0.5s;
    }
    .status.hidden { opacity: 0; }
  </style>
</head>
<body>
  <div id="player">
    <div class="status" id="status">Connecting...</div>
  </div>

  <script>
    let ytPlayer = null;
    let currentVideoId = null;
    const statusEl = document.getElementById('status');

    function hideStatus() {
      statusEl.classList.add('hidden');
      setTimeout(() => statusEl.style.display = 'none', 500);
    }

    function loadVideo(videoId) {
      if (currentVideoId === videoId) return;
      currentVideoId = videoId;

      if (!ytPlayer) {
        ytPlayer = new YT.Player('player', {
          width: '100%', height: '100%',
          videoId: videoId,
          playerVars: { autoplay: 1, modestbranding: 1, rel: 0, fs: 1, controls: 1 },
          events: { onReady: e => e.target.playVideo() }
        });
      } else {
        ytPlayer.loadVideoById(videoId);
      }
      hideStatus();
    }

    // Load YouTube IFrame API
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
      const source = new EventSource('/api/queue/stream');

      source.onmessage = ev => {
        try {
          const data = JSON.parse(ev.data);
          if (data.current && data.current !== currentVideoId) {
            loadVideo(data.current);
          }
        } catch (e) { /* ignore */ }
      };

      source.onerror = () => {
        statusEl.textContent = 'Reconnecting...';
        statusEl.style.display = 'block';
        statusEl.classList.remove('hidden');
      };
    }
  </script>
</body>
</html>
